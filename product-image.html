<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Cormorant Garamond', Georgia, serif;
  }
  .card {
    width: 800px;
    height: 450px;
    background: #07060F;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Soft radial glow */
  .glow {
    position: absolute;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(140,120,240,0.13) 0%, transparent 65%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -55%);
    pointer-events: none;
  }

  /* Moon graphic */
  .moon-wrap {
    position: relative;
    margin-bottom: 28px;
    z-index: 1;
  }

  .label {
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.28);
    margin-bottom: 14px;
    z-index: 1;
  }

  .title {
    font-size: 52px;
    font-weight: 400;
    font-style: italic;
    color: #EDE8FF;
    letter-spacing: -0.01em;
    line-height: 1;
    z-index: 1;
    text-align: center;
  }

  .title strong {
    font-weight: 600;
    font-style: normal;
    color: #fff;
  }

  .divider {
    width: 32px;
    height: 1px;
    background: rgba(255,255,255,0.15);
    margin: 20px auto;
    z-index: 1;
  }

  .tagline {
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 13px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.01em;
    z-index: 1;
    text-align: center;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

<style>
  /* Global Mobile Scroll Fix */
  html, body {
    max-width: 100vw !important;
    overflow-x: clip !important;
  }
</style>
</head>
<body>
<div class="card">
  <div class="glow"></div>

  <div class="moon-wrap">
    <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
      <circle cx="21" cy="26" r="14" stroke="#9B8FE8" stroke-width="1.2" fill="none"/>
      <circle cx="31" cy="26" r="14" stroke="#C4B8FF" stroke-width="1.2" fill="none" opacity="0.55"/>
      <path d="M26 13.5C28.8 16.3 28.8 35.7 26 38.5C23.2 35.7 23.2 16.3 26 13.5Z" fill="#C4B8FF" opacity="0.3"/>
    </svg>
  </div>

  <div class="label">Noctaras Pro</div>
  <div class="title"><strong>Dream</strong> Journal</div>
  <div class="divider"></div>
  <div class="tagline">Interpret · Record · Understand</div>
</div>
</body>
</html>
