<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Inter', system-ui, sans-serif; }
  .banner {
    width: 1920px;
    height: 400px;
    background: #07060F;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .glow-left {
    position: absolute;
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, rgba(120,100,220,0.1) 0%, transparent 65%);
    left: -100px;
    top: 50%;
    transform: translateY(-50%);
  }
  .glow-right {
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(180,160,255,0.07) 0%, transparent 65%);
    right: -80px;
    top: 50%;
    transform: translateY(-50%);
  }
  .center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    z-index: 1;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
  }
  .brand-name {
    font-size: 22px;
    font-weight: 500;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .title {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 80px;
    font-weight: 400;
    font-style: italic;
    color: #EDE8FF;
    letter-spacing: -0.02em;
    line-height: 1;
    text-align: center;
  }
  .title strong {
    font-weight: 600;
    font-style: normal;
    color: #fff;
  }
  .sub {
    margin-top: 18px;
    font-size: 16px;
    color: rgba(255,255,255,0.28);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>
<div class="banner">
  <div class="glow-left"></div>
  <div class="glow-right"></div>
  <div class="center">
    <div class="brand">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <circle cx="11" cy="14" r="7.5" stroke="#9B8FE8" stroke-width="1.2" fill="none"/>
        <circle cx="17" cy="14" r="7.5" stroke="#C4B8FF" stroke-width="1.2" fill="none" opacity="0.55"/>
        <path d="M14 7.2C16.2 9.4 16.2 18.6 14 20.8C11.8 18.6 11.8 9.4 14 7.2Z" fill="#C4B8FF" opacity="0.3"/>
      </svg>
      <span class="brand-name">Noctaras</span>
    </div>
    <div class="title"><strong>Dream</strong> Journal &amp; Interpreter</div>
    <div class="sub">Understand your dreams · Track patterns · Grow</div>
  </div>
</div>
</body>
</html>
